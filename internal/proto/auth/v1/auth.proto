// Author: Ratheesh G Kumar — Backend Engineer (Golang)
// Neptune PAMM — Auth service gRPC contract.
// Mirrors the TFB Auth surface (05-API-PARITY) plus the registration / email-verification flow.

syntax = "proto3";

package neptune.auth.v1;

option go_package = "neptune-pamm/github.com/ratheeshkumar25/internal/proto/auth/v1;authv1";

// Role enumerates principal roles. ROLE_UNSPECIFIED guards against the proto3 zero value.
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_MONEY_MANAGER = 2;
  ROLE_INVESTOR = 3;
}

// LoginMode selects native PAMM credentials vs MT credentials.
enum LoginMode {
  LOGIN_MODE_UNSPECIFIED = 0;
  LOGIN_MODE_PAMM = 1;
  LOGIN_MODE_MT = 2;
}

// AuthService is the authentication & identity API.
service AuthService {
  // Register creates a new principal + account. Returns whether email verification is pending.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Login authenticates (PAMM or MT) and issues access/refresh tokens.
  rpc Login(LoginRequest) returns (LoginResponse);
  // Logout revokes the current session.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // ResetPassword sends a reset token to the principal's email.
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  // VerifyEmail consumes an email-verification token and activates login.
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  // GenerateSsoToken issues a one-time SSO token for an account.
  rpc GenerateSsoToken(GenerateSsoTokenRequest) returns (GenerateSsoTokenResponse);
  // LoginByToken exchanges a one-time SSO token for a session.
  rpc LoginByToken(LoginByTokenRequest) returns (LoginResponse);
  // ListCurrencies returns the public currency list for a tenant.
  rpc ListCurrencies(ListCurrenciesRequest) returns (ListCurrenciesResponse);
}

message RegisterRequest {
  int64 tenant_id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string country = 5;
  string password = 6;        // plaintext on the wire (TLS); hashed before persistence
  Role role = 7;
  string currency = 8;
  string referral_code = 9;
  bool terms_accepted = 10;
}

message RegisterResponse {
  int64 account_id = 1;
  string username = 2;
  Role role = 3;
  bool email_verification_required = 4;
}

message LoginRequest {
  LoginMode mode = 1;
  string username = 2;
  string password = 3;
  int64 mt_server_id = 4;     // required when mode = LOGIN_MODE_MT
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;       // access-token TTL, seconds
  int64 account_id = 4;
  Role role = 5;
}

message LogoutRequest {
  string access_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message ResetPasswordRequest {
  int64 tenant_id = 1;
  string email = 2;
}

message ResetPasswordResponse {
  bool sent = 1;
}

message VerifyEmailRequest {
  string token = 1;
}

message VerifyEmailResponse {
  bool verified = 1;
}

message GenerateSsoTokenRequest {
  int64 account_id = 1;
}

message GenerateSsoTokenResponse {
  string token = 1;
  int64 expires_in = 2;       // seconds
}

message LoginByTokenRequest {
  string token = 1;
}

message ListCurrenciesRequest {
  int64 tenant_id = 1;
}

message Currency {
  string name = 1;
  int32 digits = 2;
  string symbol = 3;
}

message ListCurrenciesResponse {
  repeated Currency currencies = 1;
}
